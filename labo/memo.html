<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
  async function token(){
    let url = 'https://de3qg7ntqblkinxmxfhqoisuhi0pckix.lambda-url.eu-west-3.on.aws/' //mongoProd
    let body = {
      request:'token',
      data:{
        mail:document.getElementById('mail').value,
        password:document.getElementById('password').value,
      }
    }
    console.log(body)
    let response = await axios({method:'post', url:url, headers:{}, data:body}).then(response => {return response})
    console.log(response.data)
    document.getElementById('token').value = JSON.stringify(response.data.data)
  }
</script>
<script>
  async function request(){
    let url = 'https://de3qg7ntqblkinxmxfhqoisuhi0pckix.lambda-url.eu-west-3.on.aws/' //mongoProd
    let body = {
      request:
      collection:
      token:document.getElementById('token').value,
      data:{
        mail:document.getElementById('mail').value,
        password:document.getElementById('password').value,
      }
    }
    console.log(body)
    let response = await axios({method:'post', url:url, headers:{}, data:body}).then(response => {return response})
    console.log(response.data)
    document.getElementById('token').value = JSON.stringify(response.data)
  }
</script>
