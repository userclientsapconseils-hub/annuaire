<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription</title>
</head>

<body>

<h2>Créer un compte</h2>

<form id="registerForm">
  <label>Email :</label><br>
  <input type="email" id="email" required><br><br>

  <label>Mot de passe :</label><br>
  <input type="password" id="password" required><br><br>

  <button type="submit">S'inscrire</button>
</form>

<p id="result"></p>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const url = "https://de3qg7ntqblkinxmxfhqoisuhi0pckix.lambda-url.eu-west-3.on.aws/";

  const body = {
    request: "token",
    collection: "user",
    data: {
      mail: email,
      password: password
    }
  };

  try {
    const response = await axios.post(url, body);

    console.log(response.data);
    document.getElementById("result").innerText = "Succès : " + JSON.stringify(response.data);

  } catch (error) {
    console.error(error);
    document.getElementById("result").innerText = "Erreur : " + error.message;
  }
});
</script>

</body>
</html>
