<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription</title>
</head>

<body>

<h2>Créer un compte</h2>

<form id="registerForm">
  <label for="email">Email :</label><br>
  <input type="email" id="email" required><br><br>

  <label for="password">Mot de passe :</label><br>
  <input type="password" id="password" required><br><br>

  <button type="submit">S'inscrire</button>
</form>

<p id="result"></p>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const result = document.getElementById("result");

  const url = "https://de3qg7ntqblkinxmxfhqoisuhi0pckix.lambda-url.eu-west-3.on.aws/";

  const body = {
    request: "insert",
    collection: "user",
    data: {
      identification: {
        mail: email,
        password: password
      }
    }
  };

  try {
    result.innerText = "Envoi en cours...";

    const response = await axios({
      method: "post",
      url: url,
      headers: {
        "Content-Type": "application/json"
      },
      data: body
    });

    console.log("Réponse API :", response.data);
    result.innerText = "Succès : " + JSON.stringify(response.data);

  } catch (error) {
    console.error("Erreur complète :", error);

    if (error.response) {
      result.innerText = "Erreur API : " + JSON.stringify(error.response.data);
    } else {
      result.innerText = "Erreur : " + error.message;
    }
  }
});
</script>

</body>
</html>
