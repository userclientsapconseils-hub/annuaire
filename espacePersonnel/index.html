<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Espace personnel</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b0f17;
      color:#fff;
    }
    .container{
      max-width:900px;
      margin:60px auto;
      padding:20px;
    }
    .card{
      background:#fff;
      color:#111;
      border-radius:16px;
      padding:30px;
      box-shadow:0 15px 40px rgba(0,0,0,.25);
    }
    h1{
      margin-top:0;
      margin-bottom:10px;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }
    p{
      line-height:1.5;
    }
    .info{
      margin-top:25px;
      padding:16px;
      background:#f3f4f6;
      border-radius:10px;
    }
    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:25px;
    }
    button, .btn-link{
      padding:12px 16px;
      border:none;
      border-radius:8px;
      background:#e53935;
      color:#fff;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
    }
    .btn-secondary{
      background:#111827;
    }
    .btn-light{
      background:#e5e7eb;
      color:#111;
    }
    .status{
      margin-top:20px;
      padding:14px 16px;
      border-radius:10px;
      font-size:14px;
      display:none;
    }
    .status.show{
      display:block;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }
    .status.success{
      background:#dcfce7;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.warning{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
    }
    .label{
      display:inline-block;
      margin-top:18px;
      padding:6px 10px;
      border-radius:999px;
      background:#fee2e2;
      color:#991b1b;
      font-size:12px;
      font-weight:700;
    }

    .api-offer{
      margin-top:24px;
      padding:20px;
      border:1px solid #e5e7eb;
      border-radius:14px;
      background:#f9fafb;
    }
    .api-offer h2{
      margin:0 0 10px;
      font-size:20px;
    }
    .api-offer-card{
      display:none;
      margin-top:14px;
      padding:18px;
      border:1px solid #e5e7eb;
      border-radius:12px;
      background:#fff;
    }
    .api-offer-card.show{
      display:block;
    }
    .api-offer-card h3{
      margin:0 0 10px;
      font-size:22px;
    }
    .offer-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:14px;
    }
    .offer-pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:#eef2ff;
      color:#3730a3;
      font-size:12px;
      font-weight:700;
    }
    .offer-description{
      margin:0 0 14px;
      color:#374151;
    }
    .offer-services{
      margin:0;
      padding-left:20px;
    }
    .offer-services li{
      margin-bottom:6px;
    }
    @media (max-width:700px){
      .container{
        margin:30px auto;
        padding:16px;
      }
      .card{
        padding:20px;
      }
      .actions{
        flex-direction:column;
      }
      button, .btn-link{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="top">
        <h1>Mon espace personnel</h1>
        <button id="logoutBtn">Déconnexion</button>
      </div>

      <p>Bienvenue dans votre espace personnel.</p>

      <div class="info">
        <p><strong>Email :</strong> <span id="userEmail"></span></p>
        <p><strong>Token :</strong> <span id="userToken"></span></p>
      </div>

      <span class="label">Annonce professionnelle</span>

      <div id="draftStatus" class="status"></div>

      <div class="actions">
        <a id="adActionBtn" class="btn-link" href="../submit/submitindex.html">Créer mon annonce</a>
        <button id="deleteDraftBtn" class="btn-light" type="button">Effacer le brouillon</button>
      </div>

      <section class="api-offer" aria-labelledby="apiOfferTitle">
        <h2 id="apiOfferTitle">Mon annonce enregistrée</h2>
        <p id="apiOfferStatus" class="status show info">Chargement de votre annonce liée à votre adresse mail...</p>
        <article id="apiOfferCard" class="api-offer-card" aria-live="polite"></article>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../connect/api.js"></script>
  <script>
    const SESSION_KEY = "authSession";
    const SESSION_TTL_MS = 30 * 24 * 60 * 60 * 1000; // 30 jours
    const userEmailEl = document.getElementById("userEmail");
    const userTokenEl = document.getElementById("userToken");
    const logoutBtn = document.getElementById("logoutBtn");
    const adActionBtn = document.getElementById("adActionBtn");
    const deleteDraftBtn = document.getElementById("deleteDraftBtn");
    const draftStatus = document.getElementById("draftStatus");
    const apiOfferStatus = document.getElementById("apiOfferStatus");
    const apiOfferCard = document.getElementById("apiOfferCard");

    function getStoredSession() {
      const legacyToken = localStorage.getItem("token");
      const legacyEmail = localStorage.getItem("userEmail");
      const rawSession = localStorage.getItem(SESSION_KEY);

      if (!rawSession) {
        if (legacyToken && legacyEmail) {
          return { token: legacyToken, email: legacyEmail, expiresAt: null };
        }
        return null;
      }

      try {
        const parsed = JSON.parse(rawSession);
        if (!parsed?.token || !parsed?.email) return null;
        return parsed;
      } catch (error) {
        console.error("Session invalide dans le stockage local :", error);
        return null;
      }
    }

    function persistSession(token, email) {
      const session = {
        token,
        email,
        createdAt: Date.now(),
        expiresAt: Date.now() + SESSION_TTL_MS
      };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      localStorage.setItem("token", token);
      localStorage.setItem("userEmail", email);
    }

    function getActiveSession() {
      const session = getStoredSession();
      if (!session?.token || !session?.email) return null;

      if (session.expiresAt && Date.now() >= Number(session.expiresAt)) {
        return null;
      }

      return session;
    }

    function forceLogout() {
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem("token");
      localStorage.removeItem("userEmail");
      window.location.href = "../connect/index.html";
    }


    function parseApiData(payload) {
      if (payload === null || payload === undefined) return null;
      if (typeof payload === "string") {
        try {
          return JSON.parse(payload);
        } catch {
          return payload;
        }
      }
      return payload;
    }

    const API_COLLECTION_KEYS = ["data", "body", "items", "Items", "records", "results", "offers", "annonces"];
    const OFFER_FIELD_KEYS = ["entreprise", "activite", "prestation", "prestations", "description", "cp", "ville", "nom", "prenom", "mail"];

    function hasOfferShape(value) {
      return value
        && typeof value === "object"
        && !Array.isArray(value)
        && OFFER_FIELD_KEYS.some((key) => Object.prototype.hasOwnProperty.call(value, key));
    }

    function collectApiCandidates(value, candidates, seen) {
      const parsed = parseApiData(value);
      if (parsed === null || parsed === undefined) return;

      if (Array.isArray(parsed)) {
        parsed.forEach((item) => collectApiCandidates(item, candidates, seen));
        return;
      }

      if (typeof parsed !== "object") return;
      if (seen.has(parsed)) return;
      seen.add(parsed);

      if (hasOfferShape(parsed)) {
        candidates.push(parsed);
      }

      API_COLLECTION_KEYS.forEach((key) => {
        if (Object.prototype.hasOwnProperty.call(parsed, key)) {
          collectApiCandidates(parsed[key], candidates, seen);
        }
      });
    }

    function normalizeApiCandidates(payload) {
      const candidates = [];
      collectApiCandidates(payload, candidates, new Set());
      return candidates;
    }

    function normalizePrestations(prestations) {
      if (Array.isArray(prestations)) {
        return prestations.map((item) => ({
          prestation: String(item?.prestation || item?.prestations || item?.nom || "").trim(),
          tarifHt: String(item?.tarifHt || item?.tarifHT || item?.tarif || "").trim()
        })).filter((item) => item.prestation || item.tarifHt);
      }

      if (typeof prestations === "string") {
        try {
          return normalizePrestations(JSON.parse(prestations));
        } catch {
          return prestations.trim() ? [{ prestation: prestations.trim(), tarifHt: "" }] : [];
        }
      }

      return [];
    }

    function mapOffer(rawOffer) {
      if (!rawOffer || typeof rawOffer !== "object") return null;

      return {
        entreprise: String(rawOffer.entreprise || "").trim(),
        activite: String(rawOffer.activite || "").trim(),
        prestations: normalizePrestations(rawOffer.prestations || rawOffer.prestation),
        nom: String(rawOffer.nom || "").trim(),
        prenom: String(rawOffer.prenom || "").trim(),
        cp: String(rawOffer.cp || "").trim(),
        ville: String(rawOffer.ville || "").trim(),
        adresse1: String(rawOffer.adresse1 || rawOffer.adresse || "").trim(),
        adresse2: String(rawOffer.adresse2 || "").trim(),
        description: String(rawOffer.description || "").trim(),
        mail: String(rawOffer.mail || "").trim()
      };
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showApiOfferStatus(message, type = "info") {
      apiOfferStatus.className = "status show " + type;
      apiOfferStatus.textContent = message;
    }

    function renderApiOffer(offer) {
      const title = offer.entreprise || `${offer.prenom} ${offer.nom}`.trim() || "Votre annonce";
      const location = [offer.cp, offer.ville].filter(Boolean).join(" ");
      const address = [offer.adresse1, offer.adresse2].filter(Boolean).join(" — ");
      const services = offer.prestations.map((item) => {
        const price = item.tarifHt ? ` — ${escapeHtml(item.tarifHt)}€ HT/h` : "";
        return `<li>${escapeHtml(item.prestation || "Prestation")}${price}</li>`;
      }).join("");

      apiOfferCard.innerHTML = `
        <h3>${escapeHtml(title)}</h3>
        <div class="offer-meta">
          ${offer.activite ? `<span class="offer-pill">${escapeHtml(offer.activite)}</span>` : ""}
          ${location ? `<span class="offer-pill">${escapeHtml(location)}</span>` : ""}
          ${address ? `<span class="offer-pill">${escapeHtml(address)}</span>` : ""}
        </div>
        <p class="offer-description">${escapeHtml(offer.description || "Aucune description renseignée.")}</p>
        ${services ? `<strong>Prestations</strong><ul class="offer-services">${services}</ul>` : ""}
        <div class="actions">
          <a class="btn-link btn-secondary" href="../submit/submitindex.html?fromDashboard=1">Modifier mon annonce</a>
        </div>
      `;
      apiOfferCard.classList.add("show");
    }

    async function loadApiOffer(token, userEmail) {
      apiOfferCard.classList.remove("show");
      apiOfferCard.innerHTML = "";
      showApiOfferStatus("Chargement de votre annonce liée à votre adresse mail...", "info");

      try {
        const payload = await ApiClient.findOfferByMail(token, userEmail);
        const offers = normalizeApiCandidates(payload).map(mapOffer).filter(Boolean);
        const offer = offers.find((candidate) => candidate.mail === userEmail) || offers[0];

        if (!offer) {
          showApiOfferStatus("Aucune annonce enregistrée n'est liée à votre adresse mail pour le moment.", "info");
          return;
        }

        renderApiOffer(offer);
        showApiOfferStatus("Annonce enregistrée trouvée dans l'API pour votre adresse mail.", "success");
      } catch (error) {
        console.error("Impossible de charger l'annonce liée à l'adresse mail :", error);
        showApiOfferStatus("Impossible de charger votre annonce enregistrée pour le moment.", "warning");
      }
    }

    function hasMeaningfulDraft() {
      const rawDraft = localStorage.getItem("adDraft");
      if (!rawDraft) return false;

      try {
        const draft = JSON.parse(rawDraft);
        return Object.values(draft).some(value => {
          if (Array.isArray(value)) {
            return value.some(item => Object.values(item || {}).some(itemValue => String(itemValue || "").trim() !== ""));
          }

          return String(value || "").trim() !== "";
        });
      } catch (error) {
        console.error("Erreur lecture brouillon :", error);
        return false;
      }
    }

    function showDraftStatus(message, type) {
      draftStatus.className = "status show " + type;
      draftStatus.textContent = message;
    }

    function hideDraftStatus() {
      draftStatus.className = "status";
      draftStatus.textContent = "";
    }

    function refreshDraftUI() {
      const draftExists = hasMeaningfulDraft();

      if (draftExists) {
        adActionBtn.textContent = "Reprendre mon annonce";
        adActionBtn.href = "../submit/submitindex.html?resume=1&fromDashboard=1";
        deleteDraftBtn.style.display = "inline-flex";
        showDraftStatus("Un brouillon d’annonce a été trouvé. Vous pouvez reprendre là où vous vous êtes arrêté.", "warning");
      } else {
        adActionBtn.textContent = "Créer mon annonce";
        adActionBtn.href = "../submit/submitindex.html?fromDashboard=1";
        deleteDraftBtn.style.display = "none";
        showDraftStatus("Aucun brouillon trouvé. Vous pouvez créer une nouvelle annonce.", "info");
      }
    }

    deleteDraftBtn.addEventListener("click", function() {
      localStorage.removeItem("adDraft");
      refreshDraftUI();
      showDraftStatus("Le brouillon a été supprimé.", "success");
    });

    logoutBtn.addEventListener("click", function() {
      forceLogout();
    });

    async function initDashboard() {
      const session = getActiveSession();
      const token = session?.token || "";
      const userEmail = session?.email || "";

      if (!token || !userEmail) {
        forceLogout();
        return;
      }

      persistSession(token, userEmail);
      userEmailEl.innerText = userEmail || "Non renseigné";
      userTokenEl.innerText = token ? token.slice(0, 8) + "..." : "-";
      showDraftStatus("Vérification de votre session...", "info");
      adActionBtn.style.pointerEvents = "none";
      adActionBtn.style.opacity = "0.6";
      deleteDraftBtn.disabled = true;

      const sessionState = await ApiClient.validateUserSession(token, userEmail);
      if (sessionState === "invalid") {
        forceLogout();
        return;
      }

      adActionBtn.style.pointerEvents = "";
      adActionBtn.style.opacity = "";
      deleteDraftBtn.disabled = false;
      refreshDraftUI();
      loadApiOffer(token, userEmail);

      if (sessionState === "unknown") {
        showDraftStatus("Connexion conservée. Vérification distante indisponible pour le moment.", "warning");
      }
    }

    initDashboard();
  </script>

</body>
</html>
