<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Espace personnel</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b0f17;
      color:#fff;
    }
    .container{
      max-width:900px;
      margin:60px auto;
      padding:20px;
    }
    .card{
      background:#fff;
      color:#111;
      border-radius:16px;
      padding:30px;
      box-shadow:0 15px 40px rgba(0,0,0,.25);
    }
    h1{
      margin-top:0;
      margin-bottom:10px;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }
    p{
      line-height:1.5;
    }
    .info{
      margin-top:25px;
      padding:16px;
      background:#f3f4f6;
      border-radius:10px;
    }
    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:25px;
    }
    button, .btn-link{
      padding:12px 16px;
      border:none;
      border-radius:8px;
      background:#e53935;
      color:#fff;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
    }
    .btn-secondary{
      background:#111827;
    }
    .btn-light{
      background:#e5e7eb;
      color:#111;
    }
    .status{
      margin-top:20px;
      padding:14px 16px;
      border-radius:10px;
      font-size:14px;
      display:none;
    }
    .status.show{
      display:block;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }
    .status.success{
      background:#dcfce7;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.warning{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
    }
    .label{
      display:inline-block;
      margin-top:18px;
      padding:6px 10px;
      border-radius:999px;
      background:#fee2e2;
      color:#991b1b;
      font-size:12px;
      font-weight:700;
    }
    @media (max-width:700px){
      .container{
        margin:30px auto;
        padding:16px;
      }
      .card{
        padding:20px;
      }
      .actions{
        flex-direction:column;
      }
      button, .btn-link{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="top">
        <h1>Mon espace personnel</h1>
        <button id="logoutBtn">Déconnexion</button>
      </div>

      <p>Bienvenue dans votre espace personnel.</p>

      <div class="info">
        <p><strong>Email :</strong> <span id="userEmail"></span></p>
        <p><strong>Token :</strong> <span id="userToken"></span></p>
      </div>

      <span class="label">Annonce professionnelle</span>

      <div id="draftStatus" class="status"></div>

      <div class="actions">
        <a id="adActionBtn" class="btn-link" href="../submit/submitindex.html">Créer mon annonce</a>
        <button id="deleteDraftBtn" class="btn-light" type="button">Effacer le brouillon</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const API_URL = "https://de3qg7ntqblkinxmxfhqoisuhi0pckix.lambda-url.eu-west-3.on.aws/";
    const token = localStorage.getItem("token");
    const userEmail = localStorage.getItem("userEmail");
    const rawDraft = localStorage.getItem("adDraft");

    const userEmailEl = document.getElementById("userEmail");
    const userTokenEl = document.getElementById("userToken");
    const logoutBtn = document.getElementById("logoutBtn");
    const adActionBtn = document.getElementById("adActionBtn");
    const deleteDraftBtn = document.getElementById("deleteDraftBtn");
    const draftStatus = document.getElementById("draftStatus");

    function forceLogout() {
      localStorage.removeItem("token");
      localStorage.removeItem("userEmail");
      window.location.href = "connect.html";
    }

    async function validateUserSession() {
      if (!token || !userEmail) return "invalid";

      const body = {
        request: "find",
        collection: "user",
        token: token,
        data: { mail: userEmail }
      };

      try {
        const response = await axios.post(API_URL, body, {
          headers: { "Content-Type": "application/json" }
        });
        const payload = response?.data?.data;

        if (payload === null || payload === undefined) return "invalid";

        if (Array.isArray(payload)) return payload.length > 0 ? "valid" : "invalid";
        if (typeof payload === "string") {
          try {
            const parsed = JSON.parse(payload);
            if (Array.isArray(parsed)) return parsed.length > 0 ? "valid" : "invalid";
            if (parsed && typeof parsed === "object") return Object.keys(parsed).length > 0 ? "valid" : "invalid";
            return "invalid";
          } catch (error) {
            return payload.trim() !== "" ? "valid" : "invalid";
          }
        }

        if (typeof payload === "object") return Object.keys(payload).length > 0 ? "valid" : "invalid";

        return "unknown";
      } catch (error) {
        console.error("Impossible de vérifier la session pour le moment :", error);
        return "unknown";
      }
    }

    function hasMeaningfulDraft() {
      if (!rawDraft) return false;

      try {
        const draft = JSON.parse(rawDraft);
        return Object.values(draft).some(value => String(value || "").trim() !== "");
      } catch (error) {
        console.error("Erreur lecture brouillon :", error);
        return false;
      }
    }

    function showDraftStatus(message, type) {
      draftStatus.className = "status show " + type;
      draftStatus.textContent = message;
    }

    function hideDraftStatus() {
      draftStatus.className = "status";
      draftStatus.textContent = "";
    }

    function refreshDraftUI() {
      const draftExists = hasMeaningfulDraft();

      if (draftExists) {
        adActionBtn.textContent = "Reprendre mon annonce";
        adActionBtn.href = "../submit/submitindex.html?resume=1&fromDashboard=1";
        deleteDraftBtn.style.display = "inline-flex";
        showDraftStatus("Un brouillon d’annonce a été trouvé. Vous pouvez reprendre là où vous vous êtes arrêté.", "warning");
      } else {
        adActionBtn.textContent = "Créer mon annonce";
        adActionBtn.href = "../submit/submitindex.html?fromDashboard=1";
        deleteDraftBtn.style.display = "none";
        showDraftStatus("Aucun brouillon trouvé. Vous pouvez créer une nouvelle annonce.", "info");
      }
    }

    deleteDraftBtn.addEventListener("click", function() {
      localStorage.removeItem("adDraft");
      refreshDraftUI();
      showDraftStatus("Le brouillon a été supprimé.", "success");
    });

    logoutBtn.addEventListener("click", function() {
      forceLogout();
    });

    async function initDashboard() {
      if (!token || !userEmail) {
        forceLogout();
        return;
      }

      userEmailEl.innerText = userEmail || "Non renseigné";
      userTokenEl.innerText = token || "-";
      showDraftStatus("Vérification de votre session...", "info");
      adActionBtn.style.pointerEvents = "none";
      adActionBtn.style.opacity = "0.6";
      deleteDraftBtn.disabled = true;

      const sessionState = await validateUserSession();
      if (sessionState === "invalid") {
        forceLogout();
        return;
      }

      adActionBtn.style.pointerEvents = "";
      adActionBtn.style.opacity = "";
      deleteDraftBtn.disabled = false;
      refreshDraftUI();

      if (sessionState === "unknown") {
        showDraftStatus("Connexion conservée. Vérification distante indisponible pour le moment.", "warning");
      }
    }

    initDashboard();
  </script>

</body>
</html>
