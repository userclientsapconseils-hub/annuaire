<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connexion</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>Connexion</h1>
    <p class="subtitle">Connectez-vous avec votre adresse mail et votre mot de passe.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Adresse mail</label>
        <input id="email" name="email" type="email" placeholder="contact@exemple.fr" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="Votre mot de passe" autocomplete="current-password" required>
      </div>

      <button id="submitBtn" type="submit" class="btn">Se connecter</button>
    </form>

    <p id="message" class="status"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="api.js"></script>
  <script src="../function/token">//import de la fonction crée par KES pour la gestion des tokens</script>
  <script>
    const SESSION_KEY = "authSession";
    const SESSION_TTL_MS = 30 * 24 * 60 * 60 * 1000; // 30 jours

    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const submitBtn = document.getElementById("submitBtn");
    const message = document.getElementById("message");

    function showMessage(text, type) {
      message.className = "status show " + type;
      message.textContent = text;
    }

    function getStoredSession() {
      const rawSession = localStorage.getItem(SESSION_KEY);

      if (!rawSession) {
        return null;
      }

      try {
        const session = JSON.parse(rawSession);

        if (!session || !session.token || !session.email) {
          return null;
        }

        return session;
      } catch (error) {
        console.error("Session invalide :", error);
        return null;
      }
    }

    function isSessionActive(session) {
      if (!session || !session.token || !session.email) {
        return false;
      }

      if (!session.expiresAt) {
        return false;
      }

      return Date.now() < Number(session.expiresAt);
    }

    function persistSession(token, email) {
      const session = {
        token,
        email,
        createdAt: Date.now(),
        expiresAt: Date.now() + SESSION_TTL_MS
      };

      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      localStorage.setItem("token", token);
      localStorage.setItem("userEmail", email);
    }

    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem("token");
      localStorage.removeItem("userEmail");
    }

    loginForm.addEventListener("submit", async function(event) {
      event.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email) {
        showMessage("Veuillez renseigner votre adresse mail.", "error");
        return;
      }

      if (!password) {
        showMessage("Veuillez renseigner votre mot de passe.", "error");
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "Connexion en cours...";
        showMessage("Vérification de vos identifiants...", "info");

        const token = await ApiClient.login(email, password);

        if (!token) {
          showMessage("Identifiants incorrects. Vérifiez votre mail et votre mot de passe.", "error");
          return;
        }

        persistSession(token, email);
        showMessage("Connexion réussie. Redirection vers votre dashboard...", "success");
        window.location.href = "dashboard.html";
      } catch (error) {
        console.error("Erreur de connexion :", error);
        showMessage("Impossible de se connecter pour le moment. Réessayez dans quelques instants.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Se connecter";
      }
    });

    const existingSession = getStoredSession();
    if (isSessionActive(existingSession)) {
      showMessage("Session active détectée, redirection vers votre dashboard...", "info");
      window.location.href = "dashboard.html";
    } else {
      clearSession();
    }

    const savedEmail = localStorage.getItem("userEmail");
    if (savedEmail) {
      emailInput.value = savedEmail;
    }
  </script>

</body>
</html>
