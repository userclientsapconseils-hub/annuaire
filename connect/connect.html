<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Accueil</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b0f17;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }
    .container{
      text-align:center;
    }
    h1{
      margin-bottom:24px;
      font-size:32px;
    }
    .btn{
      display:inline-block;
      padding:14px 22px;
      border:none;
      border-radius:10px;
      background:#e53935;
      color:#fff;
      font-weight:700;
      font-size:16px;
      text-decoration:none;
      cursor:pointer;
    }
    .btn:hover{
      opacity:.95;
    }
    #message{
      margin-top:16px;
      font-size:14px;
      color:#cbd5e1;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Bienvenue</h1>
    <a href="connect.html" id="loginButton" class="btn">Connexion</a>
    <p id="message"></p>
  </div>

  <script>
    const SESSION_KEY = "authSession";

    function getStoredSession() {
      const rawSession = localStorage.getItem(SESSION_KEY);

      if (!rawSession) {
        return null;
      }

      try {
        const session = JSON.parse(rawSession);

        if (!session || !session.token || !session.email) {
          return null;
        }

        return session;
      } catch (error) {
        console.error("Session invalide :", error);
        return null;
      }
    }

    function isSessionActive(session) {
      if (!session || !session.token || !session.email) {
        return false;
      }

      if (!session.expiresAt) {
        return false;
      }

      return Date.now() < Number(session.expiresAt);
    }

    function clearSession() {
      localStorage.removeItem("authSession");
      localStorage.removeItem("token");
      localStorage.removeItem("userEmail");
    }

    const loginButton = document.getElementById("loginButton");
    const message = document.getElementById("message");

    loginButton.addEventListener("click", function (e) {
      const session = getStoredSession();

      if (isSessionActive(session)) {
        e.preventDefault();
        message.innerText = "Session détectée, redirection vers votre dashboard...";
        window.location.href = "dashboard.html";
        return;
      }

      clearSession();
      message.innerText = "Aucune session valide, redirection vers la page de connexion...";
      window.location.href = "connect.html";
    });
  </script>

</body>
</html>
